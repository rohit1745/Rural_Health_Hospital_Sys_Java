<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/a_1_AdminLogin.css">
</head>
<body>

    <div class="login-box">
        <h2>Admin Login</h2>
        <form action="h_1_AdminLogin" method="post">
            <div class="user-box">
            	<label>Email</label><br>
                <input type="email" name="AdminEmail" placeholder="Enter email">
                
            </div>
            <div class="user-box">
            	<label>Password</label><br>
                <input type="password" name="AdminPassword" placeholder="Enter password">
               
            </div>
           
            <button class="btn1" type="submit">Login</button>
        </form>
    </div>

</body>
</html>
