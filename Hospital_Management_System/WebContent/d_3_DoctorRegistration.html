<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Registration</title>

    <!-- SAME CSS FILE STRUCTURE -->
    <link rel="stylesheet" href="css/d_3_DoctorRegistration.css">
</head>
<body>

<div class="form-box">
    <h2>Doctor Registration</h2>

    <form action="d_3_DoctorRuquestToAdmin" method="post">

        <div class="form-row">
            <label>Doctor Name</label>
            <input type="text" name="DoctorName" placeholder="Enter doctor name" required>
        </div>

        <div class="form-row">
            <label>Gender</label>
            <select name="DoctorGender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-row">
            <label>Specialization</label>
            <input type="text" name="DoctorSpecialization" placeholder="Enter specialization" required>
        </div>

        <div class="form-row">
            <label>Contact</label>
            <input type="text" name="DoctorContact" placeholder="Enter contact number" required>
        </div>

        <div class="form-row">
            <label>Email</label>
            <input type="email" name="DoctorEmail" placeholder="Enter email" required>
        </div>

        <div class="form-row">
            <label>Password</label>
            <input type="password" name="DoctorPassword" placeholder="Set password" required>
        </div>

        <div class="form-row">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
