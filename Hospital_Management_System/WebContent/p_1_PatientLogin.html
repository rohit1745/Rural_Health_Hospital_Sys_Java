<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login</title>

    <!-- LINK CSS FILE -->
    <link rel="stylesheet" href="css/p_1_PatientLogin.css">
</head>
<body>

    <div class="login-box">
        <h2>Patient Login</h2>

        <form action="p_1_PatientLogin" method="post">

            <div class="user-box">
                <label>Email</label>
                <input type="email" name="PatientEmail"
                       placeholder="Enter email" required>
            </div>

            <div class="user-box">
                <label>Password</label>
                <input type="password" name="PatientPassword"
                       placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        <button type="submit" onclick="window.location.href='p_2_PatientRegistration.html'">Register</button>
        </form>            
        
    </div>

</body>
</html>
