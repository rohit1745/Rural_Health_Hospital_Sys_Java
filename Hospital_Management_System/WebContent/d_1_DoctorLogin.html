<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login</title>

    <!-- LINK CSS FILE -->
    <link rel="stylesheet" href="css/d_1_DoctorLogin.css">
</head>
<body>

    <div class="login-box">
        <h2>Doctor Login</h2>

        <form action="d_1_DoctorLogin" method="post">

            <div class="user-box">
                <label>Email</label>
                <input type="email" name="DoctorEmail"
                       placeholder="Enter email" required>
            </div>

            <div class="user-box">
                <label>Password</label>
                <input type="password" name="DoctorPassword"
                       placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        <button type="submit" onclick="window.location.href='d_3_DoctorRegistration.html'">Register</button>
        </form>            
        
    </div>

</body>
</html>
