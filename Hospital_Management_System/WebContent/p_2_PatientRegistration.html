<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

<title>Patient Registration</title>

<link rel="stylesheet" href="css/p_2_PatientRegistration.css">

</head><body><div class="form-box"><h2>Patient Registration</h2>



<form action="p_2_PatientRegistration" method="post">

    <div class="form-row">
        <label for="name">Patient Name</label>
        <input type="text" name="PatientName" placeholder="Enter patient name" required>
    </div>

    <div class="form-row">
        <label for="age">Age</label>
        <input type="number" name="PatientAge" placeholder="Enter age" required>
    </div>

    <div class="form-row">
        <label for="gender">Gender</label>
        <select id="gender" name="PatientGender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </div>

    <div class="form-row">
        <label for="mobile">Mobile</label>
        <input type="number" name="PatientMobilNo" placeholder="Enter mobile number" required>
    </div>

    <div class="form-row">
        <label for="address">Address</label>
        <textarea id="address" name="PatientAddress" placeholder="Enter address"></textarea>
    </div>

    <div class="form-row">
        <label for="email">Email</label>
        <input type="email" name="PatientEmail" placeholder="Enter email" required>
    </div>

    <div class="form-row">
        <label for="password">Password</label>
        <input type="password" name="PatientPassword" placeholder="Set password" required>
    </div>

    <div class="form-row">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
    </div>

    <button type="submit">Register</button>
</form>


</div></body></html>
